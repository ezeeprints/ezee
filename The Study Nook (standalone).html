      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');

    const templateEl = document.querySelector('script[type="__bundler/template"]');

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);

        let finalBytes = bytes;
        if (entry.compressed) {

            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();

              totalLen += value.length;

            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }

    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];

    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);

      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);

      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);

      // silently dropped. Inlining makes it a plain inline babel script,

    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }

    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);

-size:17px; line-height:1.6; color:#5b554f; margin:0;\">Four small steps between you and a warm stack of freshly printed notes.<\u002Fp>\n  <\u002Fdiv>\n\n  <div style=\"position:relative; max-width:1080px; margin:0 auto;\">\n    <!-- winding dashed path -->\n    <svg viewBox=\"0 0 1080 760\" preserveAspectRatio=\"none\" style=\"position:absolute; inset:0; width:100%; height:100%; pointer-events:none;\">\n      <path d=\"M150 70 C420 70 360 230 540 230 C720 230 660 430 360 430 C150 430 200 620 700 620\" fill=\"none\" stroke=\"#cbb8c4\" stroke-width=\"3\" stroke-dasharray=\"3 12\" stroke-linecap=\"round\"><\u002Fpath>\n      <g style=\"animation:planefly 5s ease-in-out infinite; transform-origin:540px 150px;\"><path d=\"M520 150 l44 -14 -14 44 -10 -18 -20 -12Z\" fill=\"#7A6D8C\"><\u002Fpath><\u002Fg>\n      <g style=\"animation:planefly 6s ease-in-out 1s infinite; transform-origin:480px 520px;\"><path d=\"M460 520 l44 -14 -14 44 -10 -18 -20 -12Z\" fill=\"#D48A70\"><\u002Fpath><\u002Fg>\n    <\u002Fsvg>\n\n    <div style=\"position:relative; display:flex; flex-direction:column; gap:clamp(34px,4vw,56px);\">\n      <!-- step 1 -->\n      <div data-reveal=\"\" style=\"align-self:flex-start; max-width:340px; animation:riseIn .7s ease-out both;\">\n        <div style=\"background:#FAF7F1; border:1px solid rgba(42,41,40,.07); border-radius:22px; padding:26px; box-shadow:0 1px 0 rgba(255,255,255,.8) inset, 0 22px 40px -22px rgba(42,41,40,.4); transition:transform .5s cubic-bezier(.2,.9,.3,1.2), box-shadow .5s;\" style-hover=\"transform:translateY(-6px) rotate(-1deg); box-shadow:0 34px 54px -26px rgba(42,41,40,.45)\">\n          <div style=\"display:flex; align-items:center; gap:14px; margin-bottom:14px;\">\n            <span style=\"font-family:'Space Grotesk',monospace; font-weight:700; font-size:13px; color:#FAF7F1; background:#7A6D8C; width:30px; height:30px; border-radius:9px; display:grid; place-items:center;\">01<\u002Fspan>\n            <svg width=\"34\" height=\"34\" ur name on it.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ SCENE 5 — MEMORY WALL ============ -->\n<section id=\"stories\" data-screen-label=\"Stories · Memory wall\" style=\"position:relative; padding:clamp(90px,12vw,150px) clamp(22px,6vw,110px); background:linear-gradient(180deg,#EAE0D2 0%, #F2ECE2 100%); overflow:hidden;\">\n  <div data-reveal=\"\" style=\"text-align:center; max-width:680px; margin:0 auto 70px; animation:riseIn .7s ease-out both;\">\n    <span style=\"font-size:13px; font-weight:600; letter-spacing:.2em; text-transform:uppercase; color:#b9744f;\">Pinned to the wall<\u002Fspan>\n    <h2 style=\"font-family:'Cabinet Grotesk',sans-serif; font-weight:800; font-size:clamp(34px,5vw,62px); line-height:1.02; letter-spacing:-.03em; margin:14px 0 16px;\">Notes from the nook<\u002Fh2>\n    <p style=\"font-size:17px; line-height:1.6; color:#5b554f; margin:0;\">Little memories left behind by students who found their corner.<\u002Fp>\n  <\u002Fdiv>\n\n  <div style=\"max-width:1040px; margin:0 auto; display:flex; flex-wrap:wrap; justify-content:center; align-items:flex-start; gap:34px 40px;\">\n    <!-- polaroid 1 -->\n    <div data-reveal=\"\" style=\"animation:riseIn .7s ease-out both; transform-origin:center;\">\n      <div style=\"position:relative; width:264px; background:#FAF7F1; padding:14px 14px 22px; border-radius:4px; box-shadow:0 22px 38px -20px rgba(42,41,40,.5); transform:rotate(-4deg); transition:transform .5s cubic-bezier(.2,.9,.3,1.2);\" style-hover=\"transform:rotate(0deg) translateY(-6px) scale(1.02)\">\n        <div style=\"position:absolute; top:-12px; left:50%; transform:translateX(-50%) rotate(4deg); width:90px; height:26px; background:rgba(212,138,112,.5); border:1px dashed rgba(180,100,76,.4);\"><\u002Fdiv>\n        <div style=\"height:170px; border-radius:3px; background:linear-gradient(135deg,#e7b39e,#D48A70); display:grid; place-items:center;\">\n          <svg width=\"70\" height=\"80\" viewBox=\"0 0 140 170\"><path d=\"M70 40 C106 40 122 74 122 110 C122 142 102 156 70 156 C38 156 18 142 18 110 C18 74 34 40 70 40Z\" fill=\"#39312B\"><\u002Fpath><ellipse cx=\"70\" cy=\"102\" rx=\"38\" ry=\"40\" fill=\"#FAF7F1\"><\u002Fellipse><circle cx=\"57\" cy=\"100\" r=\"4.6\" fill=\"#2A2928\"><\u002Fcircle><circle cx=\"83\" cy=\"100\" r=\"4.6\" fill=\"#2A2928\"><\u002Fcircle><path d=\"M62 116 Q70 123 78 116\" stroke=\"#2A2928\" stroke-width=\"2.8\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath><path d=\"M34 60 Q70 28 106 60 Q88 68 70 68 Q52 68 34 60Z\" fill=\"#7A6D8C\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <p style=\"font-family:'Cabinet Grotesk',sans-serif; font-size:15px; line-height:1.4; color:#2A2928; margin:14px 4px 8px; text-align:center;\">\"Picked up 200 pages between lectures. Zero queue. Pure joy.\"<\u002Fp>\n        <p style=\"font-size:12.5px; color:#9a8d7d; text-align:center; margin:0;\">— Aanya, final year<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <!-- polaroid 2 (taller) -->\n    <div data-reveal=\"\" style=\"animation:riseIn .7s ease-out .06s both; margin-top:30px;\">\n      <div style=\"position:relative; width:248px; background:#FAF7F1; padding:14px 14px 20px; border-radius:4px; box-shadow:0 22px 38px -20px rgba(42,41,40,.5); transform:rotate(3deg); transition:transform .5s cubic-bezier(.2,.9,.3,1.2);\" style-hover=\"transform:rotate(0deg) translateY(-6px) scale(1.02)\">\n        <div style=\"position:absolute; top:-10px; right:14px; width:18px; height:18px; border-radius:50%; background:#7A6D8C; box-shadow:inset 0 0 0 4px #FAF7F1, 0 3px 6px rgba(0,0,0,.2);\"><\u002Fdiv>\n        <div style=\"height:140px; border-radius:3px; background:linear-gradient(135deg,#bcc8b0,#A9B59D); display:grid; place-items:center;\">\n          <svg width=\"62\" height=\"72\" viewBox=\"0 0 140 170\"><path d=\"M70 40 C106 40 122 74 122 110 C122 142 102 156 70 156 C38 156 18 142 18 110 C18 74 34 40 70 40Z\" fill=\"#39312B\"><\u002Fpath><ellipse cx=\"70\" cy=\"102\" rx=\"38\" ry=\"40\" fill=\"#FAF7F1\"><\u002Fellipse><circle cx=\"57\" cy=\"100\" r=\"4.6\" fill=\"#2A2928\"><\u002Fcircle><circle cx=\"83\" cy=\"100\" r=\"4.6\" fill=\"#2A2928\"><\u002Fcircle><path d=\"M62 116 Q70 123 78 116\" stroke=\"#2A2928\" stroke-width=\"2.8\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath><path d=\"M34 60 Q70 28 106 60 Q88 68 70 68 Q52 68 34 60Z\" fill=\"#D48A70\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <p style=\"font-family:'Cabinet Grotesk',sans-serif; font-size:15px; line-height:1.4; color:#2A2928; margin:14px 4px 8px; text-align:center;\">\"It feels less like an app and more like a friend who prints for you.\"<\u002Fp>\n        <p style=\"font-size:12.5px; color:#9a8d7d; text-align:center; margin:0;\">— Rohan, 2nd year<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <!-- sticky note testimonial -->\n    <div data-reveal=\"\" style=\"animation:riseIn .7s ease-out .12s both;\">\n      <div style=\"position:relative; width:220px; min-height:220px; background:#F0C79B; padding:24px 22px; box-shadow:0 18px 30px -16px rgba(42,41,40,.45); transform:rotate(-2deg); transition:transform .5s cubic-bezier(.2,.9,.3,1.2);\" style-hover=\"transform:rotate(0deg) translateY(-6px)\">\n        <div style=\"position:absolute; top:-9px; left:50%; transform:translateX(-50%) rotate(-3deg); width:80px; height:22px; background:rgba(250,247,241,.55); border:1px dashed rgba(120,100,70,.35);\"><\u002Fdiv>\n        <p style=\"font-family:'Cabinet Grotesk',sans-serif; font-size:18px; line-height:1.4; color:#5a4326; margin:8px 0 14px;\">\"Saved me the night before submission. Open at 1am. Legend.\"<\u002Fp>\n        <p style=\"font-size:13px; color:#7a6038; margin:0;\">— Meera<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <!-- polaroid 3 -->\n    <div data-reveal=\"\" style=\"animation:riseIn .7s ease-out .18s both; margin-top:20px;\">\n      <div style=\"position:relative; width:252px; background:#FAF7F1; padding:14px 14px 20px; border-radius:4px; box-shadow:0 22px 38px -20px rgba(42,41,40,.5); transform:rotate(2.5deg); transition:transform .5s cubic-bezier(.2,.9,.3,1.2);\" style-hover=\"transform:rotate(0deg) translateY(-6px) scale(1.02)\">\n        <div style=\"position:absolute; top:-12px; left:20px; transform:rotate(-6deg); width:84px; height:24px; background:rgba(169,181,157,.5); border:1px dashed rgba(80,100,70,.35);\"><\u002Fdiv>\n        <div style=\"height:160px; border-radius:3px; background:linear-gradient(135deg,#9b8fab,#7A6D8C); display:grid; place-items:center;\">\n          <svg width=\"66\" height=\"76\" viewBox=\"0 0 140 170\"><path d=\"M70 40 C106 40 122 74 122 110 C122 142 102 156 70 156 C38 156 18 142 18 110 C18 74 34 40 70 40Z\" fill=\"#39312B\"><\u002Fpath><ellipse cx=\"70\" cy=\"102\" rx=\"38\" ry=\"40\" fill=\"#FAF7F1\"><\u002Fellipse><circle cx=\"57\" cy=\"100\" r=\"4.6\" fill=\"#2A2928\"><\u002Fcircle><circle cx=\"83\" cy=\"100\" r=\"4.6\" fill=\"#2A2928\"><\u002Fcircle><path d=\"M62 116 Q70 123 78 116\" stroke=\"#2A2928\" stroke-width=\"2.8\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath><path d=\"M34 60 Q70 28 106 60 Q88 68 70 68 Q52 68 34 60Z\" fill=\"#A9B59D\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <p style=\"font-family:'Cabinet Grotesk',sans-serif; font-size:15px; line-height:1.4; color:#2A2928; margin:14px 4px 8px; text-align:center;\">\"Found a shop 200m from my hostel I never knew existed.\"<\u002Fp>\n        <p style=\"font-size:12.5px; color:#9a8d7d; text-align:center; margin:0;\">— Dev, 1st year<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ SCENE 6 — FAQ (NIGHT) ============ -->\n<section id=\"faq\" data-screen-label=\"FAQ · Night\" style=\"position:relative; padding:clamp(90px,12vw,150px) clamp(22px,6vw,110px); background:radial-gradient(120% 80% at 80% 10%, #3a3550 0%, #2f2b3e 38%, #262333 100%); color:#EAE4DD; overflow:hidden;\">\n  <!-- moon -->\n  <div style=\"position:absolute; top:8%; right:10%; width:90px; height:90px; border-radius:50%; background:#EAE4DD; box-shadow:0 0 60px 12px rgba(234,228,221,.3); animation:lampglow 6s ease-in-out infinite;\"><div style=\"position:absolute; top:18px; left:22px; width:16px; height:16px; border-radius:50%; background:rgba(122,109,140,.25);\"><\u002Fdiv><div style=\"position:absolute; top:46px; left:48px; width:11px; height:11px; border-radius:50%; background:rgba(122,109,140,.2);\"><\u002Fdiv><\u002Fdiv>\n  <!-- stars -->\n  <div style=\"position:absolute; top:14%; left:14%; width:4px; height:4px; border-radius:50%; background:#EAE4DD; animation:twinkle 3s ease-in-out infinite;\"><\u002Fdiv>\n  <div style=\"position:absolute; top:22%; left:38%; width:3px; height:3px; border-radius:50%; background:#EAE4DD; animation:twinkle 4s ease-in-out .5s infinite;\"><\u002Fdiv>\n  <div style=\"position:absolute; top:30%; left:62%; width:4px; height:4px; border-radius:50%; background:#EAE4DD; animation:twinkle 3.5s ease-in-out 1s infinite;\"><\u002Fdiv>\n  <div style=\"position:absolute; top:12%; left:72%; width:3px; height:3px; border-radius:50%; background:#EAE4DD; animation:twinkle 5s ease-in-out .3s infinite;\"><\u002Fdiv>\n\n  <div data-reveal=\"\" style=\"position:relative; text-align:center; max-width:680px; margin:0 auto 60px; animation:riseIn .7s ease-out both;\">\n    <span style=\"font-size:13px; font-weight:600; letter-spacing:.2em; text-transform:uppercase; color:#b6a9c8;\">After hours<\u002Fspan>\n    <h2 style=\"font-family:'Cabinet Grotesk',sans-serif; font-weight:800; font-size:clamp(34px,5vw,62px); line-height:1.02; letter-spacing:-.03em; margin:14px 0 16px; color:#FAF7F1;\">Curious minds ask<\u002Fh2>\n    <p style=\"font-size:17px; line-height:1.6; color:#b8b0c2; margin:0;\">Tap a sticky note to read the answer.<\u002Fp>\n  <\u002Fdiv>\n\n  <div style=\"position:relative; max-width:760px; margin:0 auto; display:flex; flex-direction:column; gap:16px;\">\n    <div data-faq=\"\" data-open=\"0\" data-reveal=\"\" style=\"animation:riseIn .7s ease-out both; background:#F0C79B; color:#3a2e1c; border-radius:6px 6px 6px 18px; box-shadow:0 16px 30px -16px rgba(0,0,0,.5); transform-origin:left;\">\n      <div data-faq-q=\"\" style=\"display:flex; align-items:center; justify-content:space-between; gap:16px; padding:22px 24px; cursor:pointer; user-select:none;\">\n        <span style=\"font-family:'Cabinet Grotesk',sans-serif; font-weight:700; font-size:18.5px;\">How fast can I get my prints?<\u002Fspan>\n        <span data-faq-icon=\"\" style=\"font-family:'Space Grotesk',monospace; font-size:24px; font-weight:500; transition:transform .4s cubic-bezier(.2,.9,.3,1.2); line-height:1;\">+<\u002Fspan>\n      <\u002Fdiv>\n      <div data-faq-a=\"\" style=\"max-height:0; opacity:0; overflow:hidden; transition:max-height .5s cubic-bezier(.2,.8,.2,1), opacity .5s ease;\"><p style=\"margin:0; padding:0 24px 22px; font-size:15px; line-height:1.6; color:#5a4326;\">Most jobs are ready in 8–15 minutes. You'll get a ping the moment your stack is warm and waiting at the counter.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div data-faq=\"\" data-open=\"0\" data-reveal=\"\" style=\"animation:riseIn .7s ease-out .05s both; background:#A9B59D; color:#27301f; border-radius:6px 18px 6px 6px; box-shadow:0 16px 30px -16px rgba(0,0,0,.5);\">\n      <div data-faq-q=\"\" style=\"display:flex; align-items:center; justify-content:space-between; gap:16px; padding:22px 24px; cursor:pointer; user-select:none;\">\n        <span style=\"font-family:'Cabinet Grotesk',sans-serif; font-weight:700; font-size:18.5px;\">Which file formats can I upload?<\u002Fspan>\n        <span data-faq-icon=\"\" style=\"font-family:'Space Grotesk',monospace; font-size:24px; font-weight:500; transition:transform .4s cubic-bezier(.2,.9,.3,1.2); line-height:1;\">+<\u002Fspan>\n      <\u002Fdiv>\n      <div data-faq-a=\"\" style=\"max-height:0; opacity:0; overflow:hidden; transition:max-height .5s cubic-bezier(.2,.8,.2,1), opacity .5s ease;\"><p style=\"margin:0; padding:0 24px 22px; font-size:15px; line-height:1.6; color:#3c4632;\">PDFs, Word docs, slides, and plain images (JPG/PNG). Drop in as many as you like — Ezi keeps them in order.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div data-faq=\"\" data-open=\"0\" data-reveal=\"\" style=\"animation:riseIn .7s ease-out .1s both; background:#D48A70; color:#3a241a; border-radius:6px 6px 18px 6px; box-shadow:0 16px 30px -16px rgba(0,0,0,.5);\">\n      <div data-faq-q=\"\" style=\"display:flex; align-items:center; justify-content:space-between; gap:16px; padding:22px 24px; cursor:pointer; user-select:none;\">\n        <span style=\"font-family:'Cabinet Grotesk',sans-serif; font-weight:700; font-size:18.5px;\">How do I pay?<\u002Fspan>\n        <span data-faq-icon=\"\" style=\"font-family:'Space Grotesk',monospace; font-size:24px; font-weight:500; transition:transform .4s cubic-bezier(.2,.9,.3,1.2); line-height:1;\">+<\u002Fspan>\n      <\u002Fdiv>\n      <div data-faq-a=\"\" style=\"max-height:0; opacity:0; overflow:hidden; transition:max-height .5s cubic-bezier(.2,.8,.2,1), opacity .5s ease;\"><p style=\"margin:0; padding:0 24px 22px; font-size:15px; line-height:1.6; color:#5a3a2a;\">Pay right in the app with UPI, cards, or wallets before you arrive. Walk in, collect, and you're done — no fumbling for change.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div data-faq=\"\" data-open=\"0\" data-reveal=\"\" style=\"animation:riseIn .7s ease-out .15s both; background:#9b8fab; color:#241d2e; border-radius:18px 6px 6px 6px; box-shadow:0 16px 30px -16px rgba(0,0,0,.5);\">\n      <div data-faq-q=\"\" style=\"display:flex; align-items:center; justify-content:space-between; gap:16px; padding:22px 24px; cursor:pointer; user-select:none;\">\n        <span style=\"font-family:'Cabinet Grotesk',sans-serif; font-weight:700; font-size:18.5px;\">Is my data kept private?<\u002Fspan>\n        <span data-faq-icon=\"\" style=\"font-family:'Space Grotesk',monospace; font-size:24px; font-weight:500; transition:transform .4s cubic-bezier(.2,.9,.3,1.2); line-height:1;\">+<\u002Fspan>\n      <\u002Fdiv>\n      <div data-faq-a=\"\" style=\"max-height:0; opacity:0; overflow:hidden; transition:max-height .5s cubic-bezier(.2,.8,.2,1), opacity .5s ease;\"><p style=\"margin:0; padding:0 24px 22px; font-size:15px; line-height:1.6; color:#3a3148;\">Always. Files are encrypted, shared only with the shop you choose, and auto-deleted after your job is printed and collected.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ FINAL SCENE — LATE NIGHT CTA ============ -->\n<section id=\"cta\" data-screen-label=\"CTA · Late night\" style=\"position:relative; padding:clamp(100px,14vw,170px) clamp(22px,6vw,110px) clamp(70px,8vw,90px); background:radial-gradient(100% 80% at 50% 110%, #3a2f2a 0%, #29211e 45%, #211b19 100%); color:#FAF7F1; text-align:center; overflow:hidden;\">\n  <!-- stars -->\n  <div style=\"position:absolute; top:12%; left:18%; width:4px; height:4px; border-radius:50%; background:#FAF7F1; animation:twinkle 3.4s ease-in-out infinite;\"><\u002Fdiv>\n  <div style=\"position:absolute; top:20%; left:46%; width:3px; height:3px; border-radius:50%; background:#FAF7F1; animation:twinkle 4.2s ease-in-out .6s infinite;\"><\u002Fdiv>\n  <div style=\"position:absolute; top:16%; left:74%; width:4px; height:4px; border-radius:50%; background:#FAF7F1; animation:twinkle 3.8s ease-in-out 1.1s infinite;\"><\u002Fdiv>\n  <div style=\"position:absolute; top:30%; left:30%; width:3px; height:3px; border-radius:50%; background:#FAF7F1; animation:twinkle 5s ease-in-out .2s infinite;\"><\u002Fdiv>\n  <div style=\"position:absolute; top:34%; left:62%; width:3px; height:3px; border-radius:50%; background:#FAF7F1; animation:twinkle 4.6s ease-in-out .9s infinite;\"><\u002Fdiv>\n\n  <!-- desk lamp glow -->\n  <div style=\"position:absolute; bottom:0; left:50%; transform:translateX(-50%); width:560px; height:360px; background:radial-gradient(circle at 50% 100%, rgba(240,199,155,.4), rgba(240,199,155,0) 64%); pointer-events:none; animation:lampglow 5s ease-in-out infinite;\"><\u002Fdiv>\n\n  <div data-reveal=\"\" style=\"position:relative; z-index:2; max-width:680px; margin:0 auto; animation:riseIn .7s ease-out both;\">\n    <!-- Ezi waving -->\n    <div style=\"width:150px; margin:0 auto 18px; animation:breathe 4s ease-in-out infinite;\">\n      <svg viewBox=\"0 0 160 180\" style=\"width:100%; overflow:visible; filter:drop-shadow(0 18px 26px rgba(0,0,0,.45));\">\n        <ellipse cx=\"80\" cy=\"168\" rx=\"46\" ry=\"9\" fill=\"#000\" opacity=\".25\"><\u002Fellipse>\n        <path d=\"M50 128 q30 14 60 0 l-3 14 q-27 12 -54 0Z\" fill=\"#A9B59D\"><\u002Fpath>\n        <path d=\"M80 44 C118 44 136 80 136 118 C136 152 114 168 80 168 C46 168 24 152 24 118 C24 80 42 44 80 44Z\" fill=\"#39312B\"><\u002Fpath>\n        <ellipse cx=\"80\" cy=\"110\" rx=\"42\" ry=\"44\" fill=\"#FAF7F1\"><\u002Fellipse>\n        <circle cx=\"66\" cy=\"108\" r=\"5\" fill=\"#2A2928\"><\u002Fcircle><circle cx=\"94\" cy=\"108\" r=\"5\" fill=\"#2A2928\"><\u002Fcircle>\n        <circle cx=\"67.6\" cy=\"106.2\" r=\"1.7\" fill=\"#fff\"><\u002Fcircle><circle cx=\"95.6\" cy=\"106.2\" r=\"1.7\" fill=\"#fff\"><\u002Fcircle>\n        <ellipse cx=\"55\" cy=\"121\" rx=\"8\" ry=\"5\" fill=\"#D48A70\" opacity=\".55\"><\u002Fellipse><ellipse cx=\"105\" cy=\"121\" rx=\"8\" ry=\"5\" fill=\"#D48A70\" opacity=\".55\"><\u002Fellipse>\n        <path d=\"M71 125 Q80 133 89 125\" stroke=\"#2A2928\" stroke-width=\"3.2\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath>\n        <path d=\"M40 64 Q80 30 120 64 Q100 72 80 72 Q60 72 40 64Z\" fill=\"#7A6D8C\"><\u002Fpath><circle cx=\"80\" cy=\"40\" r=\"6\" fill=\"#7A6D8C\"><\u002Fcircle>\n        <!-- waving arm -->\n        <g style=\"transform-origin:128px 120px; animation:sway 1.4s ease-in-out infinite;\"><path d=\"M122 122 q22 -10 26 -30\" fill=\"none\" stroke=\"#39312B\" stroke-width=\"13\" stroke-linecap=\"round\"><\u002Fpath><circle cx=\"150\" cy=\"90\" r=\"9\" fill=\"#39312B\"><\u002Fcircle><\u002Fg>\n      <\u002Fsvg>\n    <\u002Fdiv>\n    <h2 style=\"font-family:'Cabinet Grotesk',sans-serif; font-weight:900; font-size:clamp(40px,6.4vw,82px); line-height:.98; letter-spacing:-.035em; margin:0 0 18px;\">Ready to print?<\u002Fh2>\n    <p style=\"font-size:clamp(16px,1.7vw,19px); line-height:1.6; color:#c9bfb6; max-width:440px; margin:0 auto 36px;\">The nook's still warm and the lamp's still on. Bring your notes — Ezi will handle the rest.<\u002Fp>\n    <a href=\"#hero\" style=\"text-decoration:none; display:inline-flex; align-items:center; gap:11px; font-size:17px; font-weight:600; color:#2A2928; background:#F0C79B; padding:18px 32px; border-radius:18px; box-shadow:0 18px 40px -14px rgba(240,199,155,.7); transition:transform .4s cubic-bezier(.2,.9,.3,1.3), box-shadow .4s;\" style-hover=\"transform:translateY(-3px) scale(1.02); box-shadow:0 26px 50px -16px rgba(240,199,155,.8)\" style-active=\"transform:translateY(2px) scale(.97)\">\n      Start Your Journey\n      <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#2A2928\" stroke-width=\"2.4\" stroke-linecap=\"round\"><path d=\"M5 12h14M13 6l6 6-6 6\"><\u002Fpath><\u002Fsvg>\n    <\u002Fa>\n    <div style=\"margin-top:70px; padding-top:26px; border-top:1px solid rgba(250,247,241,.12); display:flex; flex-wrap:wrap; gap:14px; align-items:center; justify-content:center; font-size:13.5px; color:#9a9085;\">\n      <span style=\"font-family:'Cabinet Grotesk',sans-serif; font-weight:800; font-size:16px; color:#EAE4DD;\">EZEE<\u002Fspan>\n      <span>·<\u002Fspan>\n      <span>Made in the study nook, one warm print at a time.<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  componentDidMount() {\n    this._setup();\n    setTimeout(() => this._setup(), 400);\n  }\n\n  _setup() {\n\n    // FAQ accordion\n    document.querySelectorAll('[data-faq]:not([data-bound])').forEach((item) => {\n      item.setAttribute('data-bound', '1');\n      const q = item.querySelector('[data-faq-q]');\n      const a = item.querySelector('[data-faq-a]');\n      const icon = item.querySelector('[data-faq-icon]');\n      q.addEventListener('click', () => {\n        const open = item.getAttribute('data-open') === '1';\n        if (open) {\n          a.style.maxHeight = '0px';\n          a.style.opacity = '0';\n          item.setAttribute('data-open', '0');\n          if (icon) icon.style.transform = 'rotate(0deg)';\n        } else {\n          a.style.maxHeight = a.scrollHeight + 'px';\n          a.style.opacity = '1';\n          item.setAttribute('data-open', '1');\n          if (icon) icon.style.transform = 'rotate(135deg)';\n        }\n      });\n    });\n\n    // navbar shadow on scroll\n    const nav = document.querySelector('[data-nav]');\n    if (nav) {\n      const onScroll = () => {\n        if (window.scrollY > 40) {\n          nav.style.boxShadow = '0 1px 0 rgba(255,255,255,.7) inset, 0 16px 40px -14px rgba(42,41,40,.4), 0 3px 8px rgba(42,41,40,.1)';\n          nav.style.background = 'rgba(250,247,241,.92)';\n        } else {\n          nav.style.boxShadow = '0 1px 0 rgba(255,255,255,.7) inset, 0 10px 30px -12px rgba(42,41,40,.28), 0 2px 6px rgba(42,41,40,.06)';\n          nav.style.background = 'rgba(250,247,241,.82)';\n        }\n      };\n      window.addEventListener('scroll', onScroll, { passive: true });\n      onScroll();\n    }\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
