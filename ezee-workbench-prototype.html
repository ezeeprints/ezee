<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EZEE — The Workbench & The Observatory</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&family=Space+Grotesk:wght@400;500;600;700&display=swap" />
<style>
/* =================================================================
   EZEE UNIVERSE — operational register
   Derived from the live codebase: same Laws, same materials, same Ezi.
   Quiet. Nothing performs. Everything has weight. Light makes emotion.
   ================================================================= */
:root{
  /* Materials (from the canon) */
  --paper:        #FAF7F1;
  --paper-2:      #F3EDE3;
  --paper-3:      #EAE2D4;
  --paper-edge:   #E0D6C5;
  --ink:          #2A2928;
  --ink-2:        #6E665B;
  --ink-3:        #9A9183;
  --terracotta:   #C2674A;   /* urgent / warm accent  */
  --terracotta-soft:#D48A70;
  --plum:         #7A6D8C;   /* information / new      */
  --sage:         #7E8C6F;   /* ready / healthy        */
  --sage-soft:    #A9B59D;
  --brass:        #B8912E;   /* in-progress / highlight*/
  --brass-soft:   #D4AF37;
  --wood:         #4A3219;
  --wood-deep:    #36220E;
  --crimson:      #9B2C2C;   /* error / refund         */

  /* Weight (Third Law) — ink-tinted, never grey */
  --rest:  0 1px 0 rgba(255,255,255,.6) inset, 0 2px 5px rgba(42,41,40,.06), 0 8px 18px rgba(42,41,40,.05);
  --hover: 0 1px 0 rgba(255,255,255,.7) inset, 0 4px 10px rgba(42,41,40,.09), 0 14px 30px rgba(42,41,40,.08);
  --press: inset 0 2px 6px rgba(42,41,40,.18);
  --well:  inset 0 2px 5px rgba(42,41,40,.10);

  /* Motion (Fifth Law) — breathes, 400–700ms, spring */
  --spring: 520ms cubic-bezier(.34,1.4,.5,1);
  --soft:   400ms cubic-bezier(.25,1,.5,1);

  --r: 14px; --r-sm: 9px;

  /* Light (Fourth Law) — set at runtime by time of day */
  --warmth: 0;
}
*{box-sizing:border-box;margin:0;padding:0}
html{ -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility }
body{
  font-family:'Instrument Sans',system-ui,sans-serif;
  color:var(--ink);
  background:
    radial-gradient(1200px 700px at 78% -8%, rgba(212,175,55,calc(.10 + var(--warmth)*.10)) 0%, transparent 60%),
    radial-gradient(900px 600px at -5% 110%, rgba(122,109,140,.06) 0%, transparent 55%),
    linear-gradient(180deg, var(--paper) 0%, var(--paper-2) 100%);
  background-attachment:fixed;
  min-height:100vh; overflow-x:hidden;
  transition: background var(--spring);
}
/* Sixth Law: textures matter — paper grain over everything */
body::after{
  content:""; position:fixed; inset:0; pointer-events:none; z-index:9999; opacity:.035;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 220 220' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}
::selection{ background:var(--terracotta-soft); color:var(--paper) }
button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit}
.mono{ font-family:'Space Grotesk',monospace; font-variant-numeric:tabular-nums; letter-spacing:-.01em }
.label{ font-family:'Space Grotesk',sans-serif; text-transform:uppercase; letter-spacing:.14em; font-size:10.5px; font-weight:600; color:var(--ink-3) }
.display{ font-family:'Space Grotesk',sans-serif; letter-spacing:-.025em; font-weight:600 }

/* ===================== SHELL ===================== */
.app{ display:grid; grid-template-columns:236px 1fr; min-height:100vh }
@media(max-width:980px){ .app{ grid-template-columns:1fr } }

/* sidebar */
.rail{
  position:sticky; top:0; align-self:start; height:100vh; padding:22px 16px;
  display:flex; flex-direction:column; gap:6px;
  background:linear-gradient(180deg, rgba(255,255,255,.5), rgba(243,237,227,.35));
  border-right:1px solid var(--paper-edge); backdrop-filter:blur(2px);
}
@media(max-width:980px){ .rail{ position:fixed; left:-260px; z-index:60; width:236px; transition:left var(--spring); box-shadow:var(--hover) } .rail.open{ left:0 } }
.brand{ display:flex; align-items:center; gap:10px; padding:4px 8px 14px }
.brand .seal{
  width:34px; height:34px; border-radius:10px; flex:none;
  background:linear-gradient(160deg,var(--ink),#3c3a37); color:var(--paper);
  display:grid; place-items:center; box-shadow:var(--rest); font-family:'Space Grotesk'; font-weight:700; font-size:15px;
  position:relative;
}
.brand .seal::after{ content:""; position:absolute; inset:3px; border:1px solid rgba(250,247,241,.18); border-radius:7px }
.brand b{ font-family:'Space Grotesk'; letter-spacing:-.02em; font-size:16px }
.brand small{ display:block; font-size:10px; color:var(--ink-3); letter-spacing:.16em; text-transform:uppercase; margin-top:1px }

.ezi-card{
  margin:6px 4px 14px; padding:14px 12px 12px; border-radius:var(--r);
  background:linear-gradient(165deg,#fffdf8,#efe7d9);
  box-shadow:var(--rest); border:1px solid var(--paper-edge);
  text-align:center; position:relative; overflow:hidden;
}
.ezi-card .glow{ position:absolute; top:-30px; left:50%; transform:translateX(-50%); width:120px; height:120px;
  background:radial-gradient(circle, rgba(212,175,55,.28),transparent 68%); opacity:calc(.25 + var(--warmth)); transition:opacity var(--spring); pointer-events:none }
.ezi-card svg{ width:74px; height:90px; display:block; margin:0 auto; position:relative; z-index:1 }
.ezi-card .say{ position:relative; z-index:1; margin-top:4px; font-size:12px; color:var(--ink-2); min-height:30px; line-height:1.35; transition:opacity var(--soft) }
.ezi-breathe{ animation:breathe 5.5s ease-in-out infinite }
@keyframes breathe{ 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }

.nav{ display:flex; flex-direction:column; gap:2px; margin-top:2px }
.nav button{
  display:flex; align-items:center; gap:11px; padding:9px 11px; border-radius:10px;
  font-size:13.5px; color:var(--ink-2); font-weight:500; transition:background var(--soft),color var(--soft);
  text-align:left; width:100%;
}
.nav button .ic{ width:17px; height:17px; flex:none; color:var(--ink-3); transition:color var(--soft) }
.nav button:hover{ background:rgba(42,41,40,.045); color:var(--ink) }
.nav button.on{ background:linear-gradient(120deg,rgba(122,109,140,.16),rgba(122,109,140,.07)); color:var(--ink); box-shadow:var(--rest) }
.nav button.on .ic{ color:var(--plum) }
.nav .count{ margin-left:auto; font-family:'Space Grotesk'; font-size:11px; font-weight:600; min-width:20px; height:20px; padding:0 5px;
  display:grid; place-items:center; border-radius:6px; background:rgba(42,41,40,.06); color:var(--ink-2) }
.nav button.on .count{ background:var(--plum); color:#fff }

.rail .spacer{ flex:1 }
.rail-foot{ display:flex; flex-direction:column; gap:8px; padding:8px 6px 2px; border-top:1px solid var(--paper-edge); margin-top:6px }
.toggle{ display:flex; align-items:center; justify-content:space-between; font-size:12.5px; color:var(--ink-2); padding:6px 6px }
.sw{ width:40px; height:23px; border-radius:20px; background:var(--paper-3); box-shadow:var(--well); position:relative; transition:background var(--spring); flex:none }
.sw::after{ content:""; position:absolute; top:2.5px; left:2.5px; width:18px; height:18px; border-radius:50%; background:#fff; box-shadow:var(--rest); transition:transform var(--spring) }
.sw.on{ background:var(--sage) } .sw.on::after{ transform:translateX(17px) }
.sw.brass.on{ background:var(--brass) }

/* main */
.main{ min-width:0; display:flex; flex-direction:column }
.topbar{
  position:sticky; top:0; z-index:30; display:flex; align-items:center; gap:16px;
  padding:14px 26px; border-bottom:1px solid var(--paper-edge);
  background:linear-gradient(180deg, rgba(250,247,241,.92), rgba(250,247,241,.78)); backdrop-filter:blur(8px);
}
.burger{ display:none; width:36px; height:36px; border-radius:9px; box-shadow:var(--rest); background:#fff; align-items:center; justify-content:center }
@media(max-width:980px){ .burger{ display:flex } }
.topbar h1{ font-family:'Space Grotesk'; font-size:19px; letter-spacing:-.02em; font-weight:600 }
.topbar .sub{ font-size:12px; color:var(--ink-3); margin-top:1px }
.topbar .grow{ flex:1 }
.clockchip{ display:flex; align-items:center; gap:8px; font-size:12.5px; color:var(--ink-2);
  padding:7px 12px; border-radius:10px; background:#fff; box-shadow:var(--rest); border:1px solid var(--paper-edge) }
.clockchip .mono{ font-weight:600; color:var(--ink) }
.openchip{ display:flex; align-items:center; gap:8px; font-size:12.5px; font-weight:600; padding:7px 13px; border-radius:10px;
  background:linear-gradient(160deg,#fff,#f1ece2); box-shadow:var(--rest); border:1px solid var(--paper-edge) }
.openchip .dot{ width:8px; height:8px; border-radius:50%; background:var(--sage); box-shadow:0 0 0 3px rgba(126,140,111,.18) }
.openchip.closed .dot{ background:var(--ink-3); box-shadow:0 0 0 3px rgba(154,145,131,.18) }

/* segmented view switcher */
.seg{ display:flex; gap:3px; padding:3px; border-radius:11px; background:var(--paper-3); box-shadow:var(--well) }
.seg button{ padding:6px 13px; border-radius:8px; font-size:12.5px; font-weight:600; color:var(--ink-2); transition:all var(--soft); font-family:'Space Grotesk' }
.seg button.on{ background:#fff; color:var(--ink); box-shadow:var(--rest) }

.canvas{ padding:22px 26px 60px; max-width:1340px; width:100% }
@media(max-width:600px){ .canvas{ padding:16px 14px 50px } .topbar{ padding:12px 14px } }

/* stat strip */
.stats{ display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:20px }
@media(max-width:840px){ .stats{ grid-template-columns:repeat(2,1fr) } }
.stat{ padding:14px 15px; border-radius:var(--r); background:linear-gradient(165deg,#fffdf8,#f1ebdf); box-shadow:var(--rest); border:1px solid var(--paper-edge); position:relative; overflow:hidden }
.stat .label{ margin-bottom:7px }
.stat .big{ font-family:'Space Grotesk'; font-size:27px; font-weight:600; letter-spacing:-.03em; line-height:1 }
.stat .big small{ font-size:14px; color:var(--ink-3); font-weight:500 }
.stat .trail{ font-size:11.5px; color:var(--ink-2); margin-top:5px }
.stat .edge{ position:absolute; left:0; top:0; bottom:0; width:3px; border-radius:3px }

/* layout: queue + side */
.work{ display:grid; grid-template-columns:1fr 320px; gap:20px; align-items:start }
@media(max-width:1080px){ .work{ grid-template-columns:1fr } }

/* tabs */
.tabs{ display:flex; gap:4px; margin-bottom:16px; flex-wrap:wrap }
.tab{ display:flex; align-items:center; gap:8px; padding:8px 14px; border-radius:10px; font-size:13px; font-weight:600;
  color:var(--ink-2); background:transparent; transition:all var(--soft); font-family:'Space Grotesk' }
.tab:hover{ background:rgba(42,41,40,.05) }
.tab.on{ background:#fff; color:var(--ink); box-shadow:var(--rest); border:1px solid var(--paper-edge) }
.tab .pill{ font-size:11px; min-width:19px; height:19px; padding:0 5px; border-radius:6px; display:grid; place-items:center;
  background:rgba(42,41,40,.08); color:var(--ink-2) }
.tab.on .pill{ background:var(--ink); color:#fff }

/* ===================== THE DOCKET (signature) ===================== */
.queue{ display:flex; flex-direction:column; gap:13px }
.docket{
  position:relative; display:grid; grid-template-columns:64px 1fr auto; gap:0;
  background:linear-gradient(180deg,#fffdf8,#f7f1e6);
  border:1px solid var(--paper-edge); border-radius:var(--r);
  box-shadow:var(--rest); overflow:hidden; cursor:pointer;
  transition:box-shadow var(--spring), transform var(--spring), border-color var(--soft);
  animation:dropin var(--spring) both;
}
@keyframes dropin{ from{opacity:0; transform:translateY(10px) rotate(-.4deg)} to{opacity:1; transform:none} }
.docket:hover{ box-shadow:var(--hover); transform:translateY(-2px) }
.docket.sel{ border-color:var(--plum); box-shadow:var(--hover), 0 0 0 1px var(--plum) }
.docket.urgent{ background:linear-gradient(180deg,#fff7f3,#f8ece5) }
.docket.leaving{ animation:leave var(--spring) both }
@keyframes leave{ to{opacity:0; transform:translateX(26px) rotate(1deg); margin-bottom:-60px} }

/* perforated stub */
.stub{
  position:relative; background:repeating-linear-gradient(180deg,#efe6d6 0 7px,#e9dfcd 7px 14px);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; padding:10px 6px;
  border-right:2px dashed rgba(42,41,40,.16);
}
.stub .code{ font-family:'Space Grotesk'; font-weight:700; font-size:13px; letter-spacing:.02em; color:var(--ink);
  writing-mode:vertical-rl; transform:rotate(180deg) }
.stub .hole{ position:absolute; width:11px; height:11px; border-radius:50%; background:var(--paper); box-shadow:var(--well); right:-6px }
.stub .hole.t{ top:11px } .stub .hole.b{ bottom:11px }

.dbody{ padding:13px 15px; min-width:0; display:flex; flex-direction:column; gap:6px }
.drow1{ display:flex; align-items:center; gap:9px; flex-wrap:wrap }
.dtitle{ font-family:'Space Grotesk'; font-weight:600; font-size:15.5px; letter-spacing:-.01em; color:var(--ink) }
.dwho{ font-size:12.5px; color:var(--ink-2) }
.dwho b{ color:var(--ink); font-weight:600 }
.dspec{ font-size:12.5px; color:var(--ink-2); display:flex; align-items:center; gap:7px; flex-wrap:wrap }
.dspec .x{ color:var(--ink-3) }
.dmeta{ display:flex; align-items:center; gap:12px; margin-top:1px; font-size:12px; color:var(--ink-3) }
.dmeta .pay{ font-weight:600 }
.pay.paid{ color:var(--sage) } .pay.cod{ color:var(--brass) }

.dact{ display:flex; flex-direction:column; align-items:flex-end; justify-content:center; gap:8px; padding:13px 15px 13px 6px }
.price{ font-family:'Space Grotesk'; font-weight:700; font-size:17px; letter-spacing:-.02em }

/* status stamp */
.stamp{ position:absolute; top:9px; right:104px; font-family:'Space Grotesk'; font-weight:700; font-size:10px;
  letter-spacing:.16em; text-transform:uppercase; padding:3px 8px; border-radius:5px; transform:rotate(-4deg);
  border:1.5px solid currentColor; opacity:.82 }
.s-new{ color:var(--plum) } .s-printing{ color:var(--brass) } .s-ready{ color:var(--sage) } .s-done{ color:var(--ink-3) } .s-urgent{ color:var(--terracotta) }
@media(max-width:600px){ .stamp{ position:static; transform:none; align-self:flex-start; margin-bottom:4px } .docket{ grid-template-columns:50px 1fr } .dact{ grid-column:1/-1; flex-direction:row; justify-content:space-between; border-top:1px dashed var(--paper-edge) } }

/* tags */
.tag{ display:inline-flex; align-items:center; gap:5px; font-family:'Space Grotesk'; font-size:10.5px; font-weight:600;
  text-transform:uppercase; letter-spacing:.08em; padding:3px 8px; border-radius:6px; background:rgba(42,41,40,.05); color:var(--ink-2) }
.tag.urgent{ background:rgba(194,103,74,.13); color:var(--terracotta) }
.tag.color{ background:rgba(122,109,140,.13); color:var(--plum) }

/* buttons */
.btn{ display:inline-flex; align-items:center; gap:7px; padding:8px 15px; border-radius:9px; font-size:13px; font-weight:600;
  font-family:'Space Grotesk'; box-shadow:var(--rest); transition:transform 90ms ease, box-shadow var(--soft), background var(--soft);
  border:1px solid transparent; white-space:nowrap }
.btn:active{ transform:translateY(1px); box-shadow:var(--press) }
.btn .ic{ width:15px; height:15px }
.btn-primary{ background:linear-gradient(165deg,#34322e,var(--ink)); color:var(--paper) }
.btn-primary:hover{ background:var(--ink) }
.btn-sage{ background:linear-gradient(165deg,#8a9a78,var(--sage)); color:#fff }
.btn-brass{ background:linear-gradient(165deg,#c79e36,var(--brass)); color:#fff }
.btn-terra{ background:linear-gradient(165deg,#d07a5c,var(--terracotta)); color:#fff }
.btn-ghost{ background:#fff; color:var(--ink-2); border-color:var(--paper-edge) }
.btn-ghost:hover{ color:var(--ink) }
.btn-sm{ padding:6px 11px; font-size:12px }

/* ===================== SIDE PANELS ===================== */
.side{ display:flex; flex-direction:column; gap:16px; position:sticky; top:84px }
@media(max-width:1080px){ .side{ position:static } }
.panel{ border-radius:var(--r); background:linear-gradient(165deg,#fffdf8,#f1ebdf); box-shadow:var(--rest); border:1px solid var(--paper-edge); overflow:hidden }
.panel h3{ font-family:'Space Grotesk'; font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-3);
  padding:13px 15px 0; font-weight:600 }
.panel .pbody{ padding:12px 15px 15px }

/* stations */
.station{ display:flex; align-items:center; gap:11px; padding:10px 0; border-bottom:1px dashed var(--paper-edge) }
.station:last-child{ border-bottom:none }
.st-icon{ width:34px; height:34px; flex:none; border-radius:9px; display:grid; place-items:center; background:var(--paper-3); box-shadow:var(--well); color:var(--ink-2) }
.station.busy .st-icon{ background:linear-gradient(160deg,#e7cf86,#d4af37); color:#5a4710; box-shadow:var(--rest) }
.st-main{ flex:1; min-width:0 }
.st-name{ font-family:'Space Grotesk'; font-weight:600; font-size:13px }
.st-job{ font-size:11.5px; color:var(--ink-2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis }
.st-idle{ font-size:11.5px; color:var(--ink-3) }
.bar{ height:5px; border-radius:4px; background:var(--paper-3); box-shadow:var(--well); margin-top:5px; overflow:hidden }
.bar > i{ display:block; height:100%; border-radius:4px; background:linear-gradient(90deg,var(--brass-soft),var(--brass)); transition:width 600ms linear }

/* stock */
.stock-row{ display:flex; align-items:center; gap:10px; padding:8px 0 }
.stock-row .nm{ font-size:13px; font-weight:500; flex:1 }
.stock-row .bar{ width:88px; margin:0 }
.stock-row .v{ font-family:'Space Grotesk'; font-size:11.5px; font-weight:600; color:var(--ink-2); width:34px; text-align:right }
.bar.ok > i{ background:linear-gradient(90deg,var(--sage-soft),var(--sage)) }
.bar.low > i{ background:linear-gradient(90deg,#d8a25c,var(--brass)) }
.bar.crit > i{ background:linear-gradient(90deg,#cf7a5c,var(--terracotta)) }
.stock-warn{ margin-top:10px; padding:9px 11px; border-radius:9px; background:rgba(194,103,74,.10); color:var(--terracotta);
  font-size:12px; display:flex; gap:8px; align-items:flex-start; line-height:1.4 }

/* empty */
.empty{ text-align:center; padding:46px 20px; color:var(--ink-3) }
.empty svg{ width:54px; height:54px; opacity:.5; margin-bottom:10px }
.empty b{ display:block; font-family:'Space Grotesk'; color:var(--ink-2); font-size:15px; margin-bottom:3px }

/* ===================== DETAIL DRAWER ===================== */
.scrim{ position:fixed; inset:0; background:rgba(42,41,40,.32); backdrop-filter:blur(2px); opacity:0; pointer-events:none; transition:opacity var(--soft); z-index:70 }
.scrim.on{ opacity:1; pointer-events:auto }
.drawer{ position:fixed; top:0; right:-460px; width:440px; max-width:92vw; height:100vh; z-index:80;
  background:linear-gradient(180deg,var(--paper),var(--paper-2)); box-shadow:-20px 0 50px rgba(42,41,40,.18);
  border-left:1px solid var(--paper-edge); transition:right var(--spring); display:flex; flex-direction:column }
.drawer.on{ right:0 }
.drawer-head{ padding:18px 20px 14px; border-bottom:1px solid var(--paper-edge); display:flex; align-items:flex-start; gap:12px }
.drawer-head .x{ margin-left:auto; width:32px; height:32px; border-radius:8px; background:#fff; box-shadow:var(--rest); display:grid; place-items:center; color:var(--ink-2) }
.drawer-body{ padding:18px 20px; overflow-y:auto; flex:1; display:flex; flex-direction:column; gap:16px }
.dv-preview{ aspect-ratio:1/1.1; border-radius:11px; background:repeating-linear-gradient(135deg,#fff 0 14px,#f6f0e6 14px 28px);
  box-shadow:var(--well); border:1px solid var(--paper-edge); display:grid; place-items:center; color:var(--ink-3); position:relative; overflow:hidden }
.dv-preview .doc{ width:58%; height:74%; background:#fff; box-shadow:var(--rest); border-radius:3px; padding:14px; display:flex; flex-direction:column; gap:6px; transform:rotate(-1.5deg) }
.dv-preview .doc i{ display:block; height:4px; border-radius:2px; background:var(--paper-3) }
.dv-preview .doc i:nth-child(1){ width:60%; height:7px; background:var(--ink-3) }
.kv{ display:grid; grid-template-columns:108px 1fr; gap:8px 12px; font-size:13.5px }
.kv .k{ color:var(--ink-3); font-family:'Space Grotesk'; font-size:11px; letter-spacing:.06em; text-transform:uppercase; padding-top:2px }
.kv .v{ color:var(--ink); font-weight:500 }
.bill{ border-top:1px dashed var(--paper-edge); padding-top:13px; display:flex; flex-direction:column; gap:7px; font-size:13.5px }
.bill .ln{ display:flex; justify-content:space-between; color:var(--ink-2) }
.bill .ln.tot{ border-top:1px solid var(--paper-edge); padding-top:8px; margin-top:3px; color:var(--ink); font-weight:700; font-family:'Space Grotesk'; font-size:16px }
.timeline{ display:flex; flex-direction:column; gap:0 }
.tl{ display:flex; gap:11px; padding-bottom:14px; position:relative }
.tl:not(:last-child)::before{ content:""; position:absolute; left:6px; top:16px; bottom:0; width:1.5px; background:var(--paper-edge) }
.tl .dot{ width:13px; height:13px; border-radius:50%; flex:none; margin-top:2px; background:var(--paper-3); box-shadow:var(--well) }
.tl.done .dot{ background:var(--sage); box-shadow:0 0 0 3px rgba(126,140,111,.16) }
.tl .ttext b{ font-family:'Space Grotesk'; font-size:13px; font-weight:600; display:block }
.tl .ttext small{ font-size:11.5px; color:var(--ink-3) }
.drawer-foot{ padding:14px 20px; border-top:1px solid var(--paper-edge); display:flex; gap:9px; background:rgba(255,255,255,.4) }
.drawer-foot .btn{ flex:1; justify-content:center }

/* pickup code reveal */
.pickup{ display:flex; align-items:center; gap:12px; padding:13px 15px; border-radius:11px;
  background:linear-gradient(160deg,#f0f3ea,#e6ecdb); box-shadow:var(--well); border:1px solid rgba(126,140,111,.3) }
.pickup .lbl{ flex:1 } .pickup .lbl small{ display:block; color:var(--sage); font-weight:600 }
.pickup .lbl .label{ color:var(--sage) }
.pickup .pc{ font-family:'Space Grotesk'; font-weight:700; font-size:26px; letter-spacing:.18em; color:var(--ink) }

/* ===================== TOASTS ===================== */
.toasts{ position:fixed; bottom:22px; left:50%; transform:translateX(-50%); z-index:120; display:flex; flex-direction:column; gap:8px; align-items:center }
.toast{ display:flex; align-items:center; gap:10px; padding:11px 17px; border-radius:11px; font-size:13.5px; font-weight:500;
  background:linear-gradient(160deg,#34322e,var(--ink)); color:var(--paper); box-shadow:var(--hover);
  animation:toastin var(--spring) both }
.toast .ic{ width:17px; height:17px; flex:none }
.toast.good .ic{ color:var(--sage-soft) } .toast.warn .ic{ color:var(--brass-soft) }
@keyframes toastin{ from{opacity:0; transform:translateY(14px)} to{opacity:1; transform:none} }

/* new-order chime ring on the rail */
@keyframes chime{ 0%{box-shadow:0 0 0 0 rgba(122,109,140,.5)} 100%{box-shadow:0 0 0 16px rgba(122,109,140,0)} }
.chiming{ animation:chime 1.4s ease-out }

/* ===================== ADMIN / OBSERVATORY ===================== */
.obs-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:20px }
@media(max-width:840px){ .obs-grid{ grid-template-columns:repeat(2,1fr) } }
.ledger{ border-radius:var(--r); background:linear-gradient(165deg,#fffdf8,#f1ebdf); box-shadow:var(--rest); border:1px solid var(--paper-edge); overflow:hidden; margin-bottom:18px }
.ledger-head{ padding:14px 17px; display:flex; align-items:center; gap:12px; border-bottom:1px solid var(--paper-edge) }
.ledger-head h3{ font-family:'Space Grotesk'; font-size:15px; font-weight:600; letter-spacing:-.01em }
.ledger-head .grow{ flex:1 }
.search{ display:flex; align-items:center; gap:8px; padding:7px 12px; border-radius:9px; background:#fff; box-shadow:var(--well); border:1px solid var(--paper-edge); color:var(--ink-3); font-size:12.5px }
.search input{ border:none; background:none; outline:none; font-family:inherit; font-size:13px; color:var(--ink); width:140px }
table{ width:100%; border-collapse:collapse; font-size:13.5px }
thead th{ font-family:'Space Grotesk'; font-size:10.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--ink-3);
  text-align:left; padding:10px 17px; font-weight:600; border-bottom:1px solid var(--paper-edge) }
tbody td{ padding:13px 17px; border-bottom:1px solid rgba(224,214,197,.55); vertical-align:middle }
tbody tr{ transition:background var(--soft) }
tbody tr:hover{ background:rgba(42,41,40,.025) }
tbody tr:last-child td{ border-bottom:none }
.cell-name{ display:flex; align-items:center; gap:10px }
.avatar{ width:32px; height:32px; border-radius:9px; flex:none; display:grid; place-items:center; font-family:'Space Grotesk'; font-weight:700; font-size:12px; color:#fff; box-shadow:var(--rest) }
.cell-name b{ font-family:'Space Grotesk'; font-weight:600; font-size:13.5px } .cell-name small{ display:block; color:var(--ink-3); font-size:11.5px }
.badge{ display:inline-flex; align-items:center; gap:6px; font-family:'Space Grotesk'; font-size:11px; font-weight:600; padding:4px 9px; border-radius:7px }
.badge .d{ width:6px; height:6px; border-radius:50% }
.b-ok{ background:rgba(126,140,111,.14); color:var(--sage) } .b-ok .d{ background:var(--sage) }
.b-pend{ background:rgba(184,145,46,.15); color:var(--brass) } .b-pend .d{ background:var(--brass) }
.b-susp{ background:rgba(155,44,44,.12); color:var(--crimson) } .b-susp .d{ background:var(--crimson) }
.b-info{ background:rgba(122,109,140,.14); color:var(--plum) } .b-info .d{ background:var(--plum) }
.rowact{ display:flex; gap:7px; justify-content:flex-end }
.mini-spark{ display:flex; align-items:flex-end; gap:2px; height:26px }
.mini-spark i{ width:4px; border-radius:2px; background:var(--sage-soft); display:block }
.two-col{ display:grid; grid-template-columns:1fr 360px; gap:18px; align-items:start }
@media(max-width:1080px){ .two-col{ grid-template-columns:1fr } }
.tick{ display:flex; gap:11px; padding:11px 0; border-bottom:1px dashed var(--paper-edge); font-size:13px }
.tick:last-child{ border-bottom:none }
.tick .pr{ font-family:'Space Grotesk'; font-size:10px; font-weight:700; padding:2px 7px; border-radius:5px; height:fit-content; text-transform:uppercase; letter-spacing:.08em }
.pr.high{ background:rgba(194,103,74,.14); color:var(--terracotta) } .pr.med{ background:rgba(184,145,46,.14); color:var(--brass) } .pr.low{ background:rgba(122,109,140,.14); color:var(--plum) }
.tick .tk-main{ flex:1; min-width:0 } .tick .tk-main b{ font-weight:600; display:block; font-size:13.5px } .tick .tk-main small{ color:var(--ink-3); font-size:11.5px }
.owl-card{ border-radius:var(--r); background:linear-gradient(165deg,#34322e,#26241f); color:var(--paper); box-shadow:var(--hover); padding:18px; position:relative; overflow:hidden }
.owl-card .label{ color:rgba(250,247,241,.55) }
.owl-card .insight{ font-size:14px; line-height:1.55; margin-top:8px; color:#efe9df }
.owl-card .insight b{ color:#fff }
.owl-card svg{ position:absolute; right:-6px; bottom:-6px; width:96px; height:96px; opacity:.9 }

.hidden{ display:none !important }
.audit{ font-family:'Space Grotesk'; font-size:12.5px }
.audit .a-row{ display:flex; gap:12px; padding:9px 0; border-bottom:1px dashed var(--paper-edge); align-items:baseline }
.audit .a-row:last-child{ border-bottom:none }
.audit .t{ color:var(--ink-3); font-size:11px; width:52px; flex:none } .audit .who{ font-weight:600 } .audit .what{ color:var(--ink-2); font-weight:400 }
</style>
</head>
<body>

<div class="app">
  <!-- ===================== RAIL ===================== -->
  <aside class="rail" id="rail">
    <div class="brand">
      <div class="seal" id="seal">E</div>
      <div><b>EZEE</b><small id="railSub">Workshop</small></div>
    </div>

    <div class="ezi-card" id="eziCard">
      <div class="glow"></div>
      <div id="eziSvg" class="ezi-breathe"></div>
      <div class="say" id="eziSay">Quiet morning. I'll watch the bench.</div>
    </div>

    <nav class="nav" id="nav"></nav>

    <div class="spacer"></div>
    <div class="rail-foot">
      <div class="toggle">
        <span id="openLabel">Shop open</span>
        <button class="sw on" id="openSw" onclick="toggleOpen()"></button>
      </div>
      <div class="toggle">
        <span>Ambient sound</span>
        <button class="sw brass" id="soundSw" onclick="toggleSound()"></button>
      </div>
    </div>
  </aside>

  <!-- ===================== MAIN ===================== -->
  <main class="main">
    <div class="topbar">
      <button class="burger" onclick="document.getElementById('rail').classList.toggle('open')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
      </button>
      <div>
        <h1 id="pageTitle">The Workbench</h1>
        <div class="sub" id="pageSub">Everything waiting, printing, and ready — on one bench.</div>
      </div>
      <div class="grow"></div>
      <div class="seg">
        <button class="on" id="segV" onclick="setView('vendor')">Workshop</button>
        <button id="segA" onclick="setView('admin')">Observatory</button>
      </div>
      <div class="clockchip"><span id="wx">☀</span> <span class="mono" id="clock">—</span></div>
      <div class="openchip" id="openChip"><span class="dot"></span><span id="openText">Open</span></div>
    </div>

    <!-- VENDOR VIEW -->
    <div class="canvas" id="view-vendor"></div>
    <!-- ADMIN VIEW -->
    <div class="canvas hidden" id="view-admin"></div>
  </main>
</div>

<!-- detail drawer -->
<div class="scrim" id="scrim" onclick="closeDrawer()"></div>
<aside class="drawer" id="drawer"></aside>

<div class="toasts" id="toasts"></div>

<script>
/* =========================================================
   EZEE — operational prototype logic
   ========================================================= */
const $ = (s,r=document)=>r.querySelector(s);
const $$ = (s,r=document)=>[...r.querySelectorAll(s)];

/* ---------- tiny icon set (lucide-ish, stroked) ---------- */
const I = {
  bench:'M3 9h18M3 9l1.5-4h15L21 9M5 9v10h14V9M9 13h6',
  printer:'M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-4a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v4a2 2 0 0 1-2 2h-2M6 14h12v8H6z',
  box:'M21 8l-9-5-9 5 9 5 9-5zM3 8v8l9 5 9-5V8M12 13v8',
  coin:'M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6',
  star:'M12 2l3 7 7 .5-5.5 4.5 2 7L12 17l-6.5 4 2-7L2 9.5 9 9z',
  stock:'M3 3h18v4H3zM5 7v14h14V7M9 11h6',
  check:'M20 6L9 17l-5-5',
  x:'M18 6L6 18M6 6l12 12',
  bell:'M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9M13.7 21a2 2 0 0 1-3.4 0',
  clock:'M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20zM12 6v6l4 2',
  hand:'M18 11V6a2 2 0 0 0-4 0M14 10V4a2 2 0 0 0-4 0v2M10 10.5V6a2 2 0 0 0-4 0v8a8 8 0 0 0 8 8h2a8 8 0 0 0 8-8v-1a2 2 0 0 0-4 0',
  play:'M5 3l14 9-14 9V3z',
  flame:'M12 2s5 4 5 9a5 5 0 0 1-10 0c0-2 1-3 1-3s3 2 4-6z',
  users:'M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75',
  globe:'M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20zM2 12h20M12 2a15 15 0 0 1 0 20 15 15 0 0 1 0-20z',
  ticket:'M3 9a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2 2 2 0 0 0 0 4 2 2 0 0 1-2 2H5a2 2 0 0 1-2-2 2 2 0 0 0 0-4zM12 7v10',
  card:'M2 7h20v10a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2zM2 11h20',
  scroll:'M8 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12M16 3h2a2 2 0 0 1 2 2v3M8 7h8M8 11h8M8 15h5',
  shield:'M12 2l8 4v6c0 5-3.5 8-8 10-4.5-2-8-5-8-10V6z',
  alert:'M12 9v4M12 17h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z',
  inbox:'M22 12h-6l-2 3h-4l-2-3H2M5 5h14l3 7v6a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2v-6z',
  gear:'M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6zM19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-2.82 1.17V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 14H4.5a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 11 4.6V4.5a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 2.82 1.17l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 11h.1a2 2 0 0 1 0 4h-.1z',
};
const svg = (p,w=18)=>`<svg class="ic" width="${w}" height="${w}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="${p}"/></svg>`;

/* ---------- EZI (canonical: coffee-ink body, cream face, plum scarf, sage beret, terracotta cheeks) ---------- */
function eziSVG(mood){
  const eyes = {
    calm:`<circle cx="84" cy="104" r="5" fill="#2A2928"/><circle cx="116" cy="104" r="5" fill="#2A2928"/>`,
    focused:`<circle cx="84" cy="104" r="14" fill="none" stroke="#2A2928" stroke-width="3"/><circle cx="116" cy="104" r="14" fill="none" stroke="#2A2928" stroke-width="3"/><circle cx="84" cy="104" r="4" fill="#2A2928"/><circle cx="116" cy="104" r="4" fill="#2A2928"/>`,
    happy:`<path d="M74 105 Q84 95 90 105" stroke="#2A2928" stroke-width="4" fill="none" stroke-linecap="round"/><path d="M110 105 Q116 95 126 105" stroke="#2A2928" stroke-width="4" fill="none" stroke-linecap="round"/>`,
    sleepy:`<path d="M76 105 Q84 109 92 105" stroke="#2A2928" stroke-width="3.5" fill="none" stroke-linecap="round"/><path d="M108 105 Q116 109 124 105" stroke="#2A2928" stroke-width="3.5" fill="none" stroke-linecap="round"/>`,
  }[mood] || '';
  const mouth = mood==='happy' ? `<path d="M94 123 Q100 133 106 123" stroke="#2A2928" stroke-width="3" fill="none" stroke-linecap="round"/>`
            : mood==='sleepy' ? `<ellipse cx="100" cy="125" rx="4" ry="5" fill="#2A2928" opacity=".7"/>`
            : `<path d="M96 124 Q100 127 104 124" stroke="#2A2928" stroke-width="2.5" fill="none" stroke-linecap="round"/>`;
  const zzz = mood==='sleepy' ? `<text x="150" y="40" font-family="Space Grotesk" font-size="16" fill="#9A9183">z</text><text x="162" y="26" font-family="Space Grotesk" font-size="20" fill="#9A9183">z</text>` : '';
  return `<svg viewBox="0 0 200 250" width="74" height="90">
    <defs><filter id="ss" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#2A2928" flood-opacity=".15"/></filter></defs>
    ${zzz}
    <g filter="url(#ss)">
      <path d="M100 30 C140 30 170 80 180 150 C185 190 160 230 100 230 C40 230 15 190 20 150 C30 80 60 30 100 30 Z" fill="#2A2928"/>
      <ellipse cx="100" cy="108" rx="58" ry="44" fill="#FAF7F1"/>
      ${eyes}
      <ellipse cx="66" cy="120" rx="11" ry="7" fill="#D48A70" opacity=".55"/>
      <ellipse cx="134" cy="120" rx="11" ry="7" fill="#D48A70" opacity=".55"/>
      ${mouth}
      <!-- apron (apprentice of the workshop) -->
      <path d="M72 150 L128 150 L138 205 L62 205 Z" fill="#5C3D1D"/>
      <path d="M72 150 L58 124 M128 150 L142 124" stroke="#36220E" stroke-width="5" fill="none" stroke-linecap="round"/>
      <rect x="90" y="168" width="20" height="16" rx="2" fill="#36220E"/>
      <line x1="96" y1="160" x2="96" y2="172" stroke="#D4AF37" stroke-width="3" stroke-linecap="round"/>
      <!-- sage beret -->
      <g transform="translate(12,-8) rotate(-10 100 40)"><ellipse cx="100" cy="40" rx="34" ry="14" fill="#A9B59D"/><path d="M100 26 L102 19 L98 19 Z" fill="#A9B59D"/></g>
    </g>
  </svg>`;
}
const eziLines = {
  calm:["Quiet bench. I'll keep the trays tidy.","Three slips waiting. No rush — they're paid.","Coffee's still warm. We're in good shape."],
  focused:["Veteran's mid-run. I'll flag jams.","Steady now — Speedster's flying.","Heads down. We'll clear this by close."],
  happy:["Handed over. Another one home.","That thesis is off to graduation. 🌱","Pickup matched. Nice work."],
  sleepy:["Shop's shut. I'll dim the lamps.","Resting the presses. See you at open.","Goodnight, bench."],
};

/* ---------- DATA ---------- */
let SEQ = 25;
const studentPool = [
  ["Aisha Khan","Final Year Thesis",120,"bw","spiral",1,"AK","#7A6D8C",1],
  ["Rahul Menon","DBMS Lab Record",46,"bw","staple",2,"RM","#7E8C6F",0],
  ["Zoya Fernandes","Architecture Sheets",12,"color","none",1,"ZF","#C2674A",1],
  ["Team Void","Hackathon Deck",18,"color","none",4,"TV","#B8912E",0],
  ["Sneha Rao","Resume — Placement",2,"color","none",6,"SR","#7A6D8C",1],
  ["Imran Sheikh","Maths Unit 3 Notes",34,"bw","staple",1,"IS","#7E8C6F",0],
  ["Divya Nair","Project Report",88,"bw","softbound",2,"DN","#C2674A",0],
  ["Karthik B","Seminar Handout",6,"bw","none",30,"KB","#B8912E",0],
  ["Meghana S","Internship Certificate",1,"color","none",3,"MS","#7A6D8C",0],
  ["Faiz Ahmed","Wedding Card Proof",1,"color","none",1,"FA","#C2674A",1],
];
function priceOf(o){
  const per = o.color==='color'?5:1.2;
  const bind = {none:0,staple:5,spiral:35,softbound:80}[o.binding];
  return Math.round((o.pages*per + bind) * o.copies);
}
function newOrder(forceStatus){
  const t = studentPool[Math.floor(Math.random()*studentPool.length)];
  const o = {
    id:'A'+(SEQ++), student:t[0], avatar:t[6], color:t[7], title:t[1],
    pages:t[2], mode:t[3], binding:t[4], copies:t[5], urgent:!!t[8],
    paid: Math.random()>0.25, status: forceStatus||'new', station:null, progress:0,
    createdAt: Date.now() - (forceStatus?Math.random()*2.4e6:0), pickup:null,
  };
  o.price = priceOf(o);
  if(o.paid===false) o.payLabel='COD'; else o.payLabel='Paid';
  return o;
}
let ORDERS = [
  newOrder('new'), newOrder('new'), newOrder('new'),
  newOrder('printing'), newOrder('printing'),
  newOrder('ready'),
  newOrder('done'), newOrder('done'), newOrder('done'),
];
ORDERS.forEach(o=>{ if(o.status==='printing'){o.progress=Math.random()*0.7+0.1;} if(o.status==='ready'||o.status==='done'){o.pickup=mkPickup();} });
// assign printing to stations
const STATIONS = [
  {id:'veteran', name:'The Veteran', sub:'Heavy mono · binding', job:null},
  {id:'speedster', name:'Speedster', sub:'Fast mono runs', job:null},
  {id:'colorpro', name:'Color Pro', sub:'CMYK · sheets', job:null},
];
ORDERS.filter(o=>o.status==='printing').forEach((o,i)=>{ const s=STATIONS[i%3]; o.station=s.id; s.job=o.id; });

let STOCK = [
  {nm:'A4 paper', v:0.72, cls:'ok', unit:'reams'},
  {nm:'A3 paper', v:0.41, cls:'ok', unit:'reams'},
  {nm:'Mono toner', v:0.55, cls:'ok', unit:''},
  {nm:'Color ink', v:0.18, cls:'crit', unit:''},
  {nm:'Spiral coils', v:0.34, cls:'low', unit:''},
];

let earnedToday = 1290, doneCount = 3;

/* ---------- STATE ---------- */
let view='vendor', vendorTab='new', activeId=null, shopOpen=true, soundOn=false, drawerId=null;

/* ---------- TIME / LIGHT (Fourth Law) ---------- */
function tick(){
  const d=new Date(), h=d.getHours();
  $('#clock').textContent = d.toLocaleTimeString('en-IN',{hour:'numeric',minute:'2-digit'});
  let warmth=0, wx='☀';
  if(h>=17||h<6){ warmth=1; wx='🌙'; } else if(h>=15){ warmth=.6; wx='🌤'; } else if(h<8){ warmth=.4; wx='🌅'; }
  if(!shopOpen) warmth=Math.max(warmth,.85);
  document.documentElement.style.setProperty('--warmth', warmth);
  $('#wx').textContent = wx;
}
setInterval(tick,1000); tick();

/* ---------- SOUND (gentle, optional, default off) ---------- */
let actx=null;
function tone(freq,dur=.12,type='sine',vol=.05){
  if(!soundOn) return;
  try{ actx=actx||new (window.AudioContext||window.webkitAudioContext)();
    const o=actx.createOscillator(), g=actx.createGain();
    o.type=type; o.frequency.value=freq; o.connect(g); g.connect(actx.destination);
    g.gain.setValueAtTime(0,actx.currentTime); g.gain.linearRampToValueAtTime(vol,actx.currentTime+.02);
    g.gain.exponentialRampToValueAtTime(.0001,actx.currentTime+dur);
    o.start(); o.stop(actx.currentTime+dur);
  }catch(e){}
}
const chime = ()=>{ tone(523.25,.18,'sine',.045); setTimeout(()=>tone(659.25,.22,'sine',.04),90); };
const thunk = ()=>{ tone(180,.09,'triangle',.06); };

/* ---------- EZI mood ---------- */
function eziMood(){
  if(!shopOpen) return 'sleepy';
  const printing = ORDERS.filter(o=>o.status==='printing').length;
  const waiting = ORDERS.filter(o=>o.status==='new').length;
  if(printing>=2 || waiting>=4) return 'focused';
  return 'calm';
}
function renderEzi(mood, sayOverride){
  const m = mood||eziMood();
  $('#eziSvg').innerHTML = eziSVG(m);
  const say = sayOverride || eziLines[m][Math.floor(Math.random()*eziLines[m].length)];
  const el=$('#eziSay'); el.style.opacity=0; setTimeout(()=>{ el.textContent=say; el.style.opacity=1; },180);
}

/* ---------- NAV ---------- */
const NAVS = {
  vendor:[
    ['bench','The Workbench','queue'],
    ['printer','Stations','stations'],

function statusStamp(o){
  if(o.status==='new') return o.urgent?`<span class="stamp s-urgent">Rush · New</span>`:`<span class="stamp s-new">New</span>`;
  if(o.status==='printing') return `<span class="stamp s-printing">Printing</span>`;
  if(o.status==='ready') return `<span class="stamp s-ready">Ready</span>`;
  return `<span class="stamp s-done">Picked up</span>`;
}
const bindLabel = {none:'loose',staple:'stapled',spiral:'spiral',softbound:'soft-bound'};
function specLine(o){
  return `${o.pages}pp <span class="x">·</span> ${o.mode==='color'?'Colour':'B/W'} <span class="x">·</span> ${bindLabel[o.binding]} <span class="x">·</span> ×${o.copies}`;
}
function waited(o){
  const m=Math.max(0,Math.round((Date.now()-o.createdAt)/60000));
  return m<60?`${m}m`:`${Math.floor(m/60)}h ${m%60}m`;
}
function primaryAction(o){

/* ---------- ACTIONS (real state machine) ---------- */
function freeStation(){ return STATIONS.find(s=>!s.job); }
function accept(id){
  const o=ORDERS.find(x=>x.id===id); if(!o) return;
  const s=freeStation();
  if(!s){ toast('All presses are busy — finish a run first',I.printer,'warn'); return; }
  o.status='printing'; o.station=s.id; o.progress=0.02; s.job=id;
  thunk(); toast(`#${o.id} on ${s.name}`,I.play,'good');
  renderEzi('focused'); renderVendor();
}
function markReady(id){
  const o=ORDERS.find(x=>x.id===id); if(!o) return;
  finishPrinting(o); renderVendor();
}
function finishPrinting(o){
  o.status='ready'; o.progress=1; o.pickup=mkPickup();
  const s=STATIONS.find(s=>s.id===o.station); if(s) s.job=null;
  // deplete a little stock
  STOCK[0].v=Math.max(.05,STOCK[0].v-0.01*o.copies);
  if(o.mode==='color'){ STOCK[3].v=Math.max(0,STOCK[3].v-0.02); reclassStock(); }
  chime(); toast(`#${o.id} ready — code ${o.pickup}`,I.bell,'good');
}
function handOver(id, code){
  const o=ORDERS.find(x=>x.id===id); if(!o) return false;
  if(code && code.toUpperCase()!==o.pickup){ toast('Pickup code doesn’t match',I.x,'warn'); return false; }
  o.status='done';
  earnedToday += o.price; doneCount++;
  thunk(); toast(`Handed to ${o.student} · +₹${o.price}`,I.check,'good');
  renderEzi('happy', `Handed #${o.id} to ${o.student.split(' ')[0]}. 🌱`);
  closeDrawer(); renderVendor();
  return true;
}
function reject(id){
  const o=ORDERS.find(x=>x.id===id); if(!o) return;
  const el=document.querySelector(`.docket[data-id="${id}"]`);
  if(el){ el.classList.add('leaving'); setTimeout(()=>{ o.status='rejected'; ORDERS=ORDERS.filter(x=>x.status!=='rejected'); closeDrawer(); renderVendor(); },480); }
  else { o.status='rejected'; ORDERS=ORDERS.filter(x=>x.status!=='rejected'); closeDrawer(); renderVendor(); }
  toast(`#${id} declined`,I.x,'warn');
}
function reclassStock(){ STOCK.forEach(s=>{ s.cls = s.v<0.2?'crit': s.v<0.4?'low':'ok'; }); }
function mkPickup(){ const a='ABCDEFGHJKMNPQRSTUVWXYZ', n='23456789'; return a[Math.floor(Math.random()*a.length)]+n[Math.floor(Math.random()*n.length)]+n[Math.floor(Math.random()*n.length)]; }

/* progress loop for printing jobs */
setInterval(()=>{
  if(!shopOpen) return;
  let changed=false;
  ORDERS.filter(o=>o.status==='printing').forEach(o=>{
    o.progress=Math.min(1,o.progress + (o.id.endsWith('0')?0.06:0.045) + Math.random()*0.02);
    changed=true;
    if(o.progress>=1){ finishPrinting(o); }
  });
  if(changed && view==='vendor' && section==='queue'){
    // soft-update station bars + tab counts without full reflow jank
    renderVendor();
  }
}, 1400);

  const o=newOrder('new'); ORDERS.push(o);

function drawerFoot(o,focusHandover){
  if(o.status==='new') return `<button class="btn btn-ghost" onclick="reject('${o.id}')">${svg(I.x,15)} Decline</button>
    <button class="btn ${o.urgent?'btn-terra':'btn-primary'}" onclick="accept('${o.id}')">${svg(I.play,15)} Accept &amp; print</button>`;
  if(o.status==='printing') return `<button class="btn btn-ghost" onclick="closeDrawer()">Keep printing</button>
    <button class="btn btn-sage" onclick="markReady('${o.id}')">${svg(I.check,15)} Mark ready</button>`;
  if(o.status==='ready') return `<button class="btn btn-ghost" onclick="closeDrawer()">Close</button>
    <button class="btn btn-brass" onclick="confirmHandover('${o.id}')">${svg(I.hand,15)} Confirm pickup</button>`;
  return `<button class="btn btn-ghost" style="flex:1" onclick="closeDrawer()">Close</button>`;
}
function confirmHandover(id){
  const o=ORDERS.find(x=>x.id===id);
  const code=prompt(`Ask ${o.student.split(' ')[0]} for their pickup code to confirm collection:\n\n(hint for the demo: ${o.pickup})`);
  if(code===null) return;
  handOver(id, code.trim());
}
function closeDrawer(){ $('#scrim').classList.remove('on'); $('#drawer').classList.remove('on'); activeId=null; $$('.docket').forEach(d=>d.classList.remove('sel')); }
function fmtAgo(t){ const m=Math.round((Date.now()-t)/60000); return m<1?'just now':m<60?m+'m ago':Math.floor(m/60)+'h ago'; }

/* ---------- toasts ---------- */
function toast(msg,icon,kind=''){
  const el=document.createElement('div'); el.className='toast '+kind;
  el.innerHTML=`${svg(icon||I.bell,17)}<span>${msg}</span>`;
  $('#toasts').appendChild(el);
  setTimeout(()=>{ el.style.transition='opacity .4s, transform .4s'; el.style.opacity=0; el.style.transform='translateY(10px)'; setTimeout(()=>el.remove(),400); }, 3200);
}

/* ---------- toggles ---------- */
function toggleOpen(){
  shopOpen=!shopOpen; $('#openSw').classList.toggle('on',shopOpen);
  $('#openLabel').textContent= shopOpen?'Shop open':'Shop closed';
  $('#openChip').classList.toggle('closed',!shopOpen);
  $('#openText').textContent= shopOpen?'Open':'Closed';
  tick(); renderEzi();
  toast(shopOpen?'Shop is open — accepting orders':'Shop closed — Ezi is resting', shopOpen?I.bench:I.clock);
}
function toggleSound(){
  soundOn=!soundOn; $('#soundSw').classList.toggle('on',soundOn);
  if(soundOn){ try{ actx=actx||new(window.AudioContext||window.webkitAudioContext)(); }catch(e){} chime(); }
  toast(soundOn?'Ambient sound on':'Sound muted', I.bell);
}

function vendorRow(v,i){
  const st=vendorState[i].status;
  const kyc = st==='ok'?`<span class="badge b-ok"><span class="d"></span>Verified</span>`
            : st==='susp'?`<span class="badge b-susp"><span class="d"></span>Suspended</span>`
            : `<span class="badge b-pend"><span class="d"></span>Pending</span>`;
  const act = st==='pend'
    ? `<button class="btn btn-ghost btn-sm" onclick="reviewVendor(${i})">${svg(I.scroll,14)} Docs</button><button class="btn btn-sage btn-sm" onclick="approveVendor(${i})">${svg(I.check,14)} Approve</button>`
    : st==='ok'
    ? `<button class="btn btn-ghost btn-sm" onclick="suspendVendor(${i})">Suspend</button>`
    : `<button class="btn btn-ghost btn-sm" onclick="approveVendor(${i})">Reinstate</button>`;
  return `<tr data-v="${i}"><td class="cell-name"><div class="avatar" style="background:${v[8]}">${v[7]}</div><div><b>${v[0]}</b><small>${v[1]}</small></div></td>
